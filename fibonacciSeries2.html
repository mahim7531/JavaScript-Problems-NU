<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci Series</title>
</head>
<body>

    <h2>Fibonacci Series (up to 10)</h2>

    <script>
        let a = 0, b = 1;

        document.write(a + "<br>");
        document.write(b + "<br>");

        while (true) {
            let c = a + b;

            if (c > 10) break; 

            document.write(c + "<br>");

            a = b;
            b = c;
        }
    </script>

</body>
</html>
